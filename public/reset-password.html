<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAGEWRX OPS - Reset Password</title>
  <meta name="theme-color" content="#060e18">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #060e18;
      padding: 24px;
    }
    .reset-box {
      background: #0e0e0e;
      border: 1px solid #1a1a1a;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .reset-logo { height: 56px; margin-bottom: 20px; }
    .reset-title { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: .06em; margin-bottom: 6px; }
    .reset-sub { font-size: 13px; color: #555; margin-bottom: 28px; }
    .reset-label { display: block; text-align: left; font-size: 11px; font-weight: 700; color: #555; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
    .reset-input {
      width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a;
      border-radius: 10px; padding: 12px 14px; font-size: 14px;
      color: #e0e0e0; outline: none; font-family: inherit;
      box-sizing: border-box; margin-bottom: 16px;
    }
    .reset-input:focus { border-color: #e53935; }
    .reset-btn {
      width: 100%; background: #e53935; border: none; border-radius: 10px;
      padding: 13px; font-size: 14px; font-weight: 700; color: #fff;
      cursor: pointer; font-family: inherit; letter-spacing: .04em;
    }
    .reset-btn:hover { background: #c62828; }
    .reset-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .reset-success {
      display: none; background: #0d2a0d; border: 1px solid #2e7d32;
      color: #81c784; border-radius: 8px; padding: 12px 14px;
      font-size: 13px; margin-top: 16px; line-height: 1.5;
    }
    .reset-error {
      display: none; background: #2a0d0d; border: 1px solid #c62828;
      color: #ff8a80; border-radius: 8px; padding: 12px 14px;
      font-size: 13px; margin-top: 16px;
    }
    .pw-strength {
      height: 3px; border-radius: 2px; margin-top: -10px;
      margin-bottom: 16px; background: #1a1a1a; overflow: hidden;
    }
    .pw-strength-bar { height: 100%; border-radius: 2px; width: 0; transition: width 0.3s, background 0.3s; }
  </style>
</head>
<body>

<div class="reset-box">
  <img class="reset-logo" src="img/cagewrx_logo.png" alt="CAGEWRX OPS"
    onerror="this.style.display='none'">
  <div class="reset-title">RESET PASSWORD</div>
  <div class="reset-sub" id="reset-sub">Enter your new password below.</div>

  <div id="reset-form">
    <label class="reset-label">New Password</label>
    <input class="reset-input" type="password" id="new-password"
      placeholder="Min. 8 characters" oninput="checkStrength(this.value)">
    <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>

    <label class="reset-label">Confirm Password</label>
    <input class="reset-input" type="password" id="confirm-password"
      placeholder="Repeat new password">

    <button class="reset-btn" id="reset-btn" onclick="doReset()">Set New Password</button>
    <div class="reset-error" id="reset-error"></div>
  </div>

  <div class="reset-success" id="reset-success">
    ✓ Password updated successfully!<br>
    <a href="index.html" style="color:#81c784;font-weight:700;">Click here to sign in →</a>
  </div>
</div>

<script src="js/supabase.js"></script>
<script>
  var SUPABASE_URL_LOCAL = 'https://jkgftyxavjppgmquueqx.supabase.co';
  var ANON_KEY_LOCAL = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprZ2Z0eXhhdmpwcGdtcXV1ZXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzU2MDQsImV4cCI6MjA5NzIxMTYwNH0.bkmtBbDvHPwqDMJnwtF9Bml3B7cs_t579c7FOqstvUo';

  // Extract access_token from URL hash (Supabase puts it there after email link click)
  var hashParams = {};
  window.location.hash.slice(1).split('&').forEach(function(p) {
    var parts = p.split('=');
    if (parts.length === 2) hashParams[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
  });

  var accessToken = hashParams['access_token'] || '';
  var tokenType   = hashParams['type'] || '';

  if (!accessToken || tokenType !== 'recovery') {
    document.getElementById('reset-sub').textContent = 'Invalid or expired reset link. Please request a new one.';
    document.getElementById('reset-form').style.display = 'none';
  }

  function checkStrength(pw) {
    var bar = document.getElementById('pw-bar');
    var score = 0;
    if (pw.length >= 8)  score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    var colors = ['#ef5350','#ff9800','#ffca28','#4caf50'];
    bar.style.width = (score * 25) + '%';
    bar.style.background = colors[score - 1] || '#1a1a1a';
  }

  function doReset() {
    var pw  = document.getElementById('new-password').value;
    var pw2 = document.getElementById('confirm-password').value;
    var err = document.getElementById('reset-error');
    err.style.display = 'none';

    if (pw.length < 8) { err.textContent = 'Password must be at least 8 characters'; err.style.display = 'block'; return; }
    if (pw !== pw2)    { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }

    var btn = document.getElementById('reset-btn');
    btn.disabled = true; btn.textContent = 'Updating...';

    fetch(SUPABASE_URL_LOCAL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': ANON_KEY_LOCAL,
        'Authorization': 'Bearer ' + accessToken
      },
      body: JSON.stringify({ password: pw })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        err.textContent = data.error || 'Update failed. Try requesting a new reset link.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set New Password';
      } else {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('reset-success').style.display = 'block';
      }
    })
    .catch(function() {
      err.textContent = 'Something went wrong. Please try again.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Set New Password';
    });
  }

  // Allow Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doReset();
  });
</script>

</body>
</html>
