<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAGEWRX OPS</title>
  <meta name="theme-color" content="#060e18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CAGEWRX OPS">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="apple-touch-icon" href="img/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/favicon.png">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #060e18;
      padding: 24px;
    }
    .login-box {
      background: #0e0e0e;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      height: 90px;
      width: auto;
      display: block;
      margin: 0 auto 24px;
    }
    .login-title {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: #444;
      text-align: center;
      margin-bottom: 28px;
    }
    .login-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .07em;
      display: block;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    .login-input {
      width: 100%;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #e0e0e0;
      outline: none;
      font-family: inherit;
    }
    .login-input:focus { border-color: #42a5f5; }
    .login-btn {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: #0f2a0f;
      border: 1px solid #1a4a1a;
      border-radius: 8px;
      color: #4caf50;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .login-btn:hover { background: #1a3a1a; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      font-size: 12px;
      color: #ff6b6b;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .login-loading {
      font-size: 12px;
      color: #42a5f5;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-box">
  <img class="login-logo" src="img/cagewrx_logo.png" alt="CAGEwrx"
    onerror="this.style.display='none'">
  <div class="login-title">CAGEWRX OPS</div>
  <div class="login-sub">Sign in to continue</div>

  <label class="login-label">Email</label>
  <input class="login-input" type="email" id="email"
    placeholder="you@cagewrx.com" autocomplete="email">

  <label class="login-label">Password</label>
  <input class="login-input" type="password" id="password"
    placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
    autocomplete="current-password">

  <button class="login-btn" id="signin-btn" onclick="signIn()">Sign In</button>
  <div class="login-error" id="login-error"></div>
  <div class="login-loading" id="login-loading">Signing in...</div>
  <div style="text-align:center;margin-top:14px;">
    <button onclick="showForgotPassword()" style="background:none;border:none;color:#555;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;">Forgot password?</button>
  </div>
</div>

<!-- Forgot password panel (hidden by default) -->
<div id="forgot-panel" style="display:none;margin-top:16px;">
  <div style="font-size:12px;color:#888;margin-bottom:10px;text-align:center;">Enter your email and we'll send a reset link.</div>
  <input class="login-input" type="email" id="reset-email" placeholder="you@cagewrx.com" autocomplete="email">
  <button class="login-btn" id="reset-btn" onclick="sendResetEmail()" style="margin-top:10px;">Send Reset Link</button>
  <div id="reset-success" style="display:none;background:#0d2a0d;border:1px solid #2e7d32;color:#81c784;border-radius:8px;padding:10px 14px;font-size:12px;margin-top:10px;text-align:center;"></div>
  <div id="reset-error" style="display:none;background:#2a0d0d;border:1px solid #c62828;color:#ff8a80;border-radius:8px;padding:10px 14px;font-size:12px;margin-top:10px;text-align:center;"></div>
  <div style="text-align:center;margin-top:10px;">
    <button onclick="hideForgotPassword()" style="background:none;border:none;color:#555;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;">Back to sign in</button>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  var SUPABASE_URL_LOCAL = 'https://jkgftyxavjppgmquueqx.supabase.co';
  var ANON_KEY_LOCAL = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprZ2Z0eXhhdmpwcGdtcXV1ZXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzU2MDQsImV4cCI6MjA5NzIxMTYwNH0.bkmtBbDvHPwqDMJnwtF9Bml3B7cs_t579c7FOqstvUo';

  // Already logged in? Go straight to ops
  (function () {
    var sess = getSession();
    if (sess && sess.access_token) {
      window.location.href = 'ops.html';
    }
  })();

  function showError(msg) {
    var e = document.getElementById('login-error');
    var l = document.getElementById('login-loading');
    var b = document.getElementById('signin-btn');
    e.textContent = msg;
    e.style.display = 'block';
    l.style.display = 'none';
    b.disabled = false;
  }

  function signIn() {
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    if (!email || !password) { showError('Please enter email and password'); return; }

    document.getElementById('login-error').style.display = 'none';
    document.getElementById('login-loading').style.display = 'block';
    document.getElementById('signin-btn').disabled = true;

    // Step 1: authenticate
    fetch(SUPABASE_URL_LOCAL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': ANON_KEY_LOCAL, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data.access_token) {
        showError(data.error_description || data.error || 'Invalid credentials');
        return;
      }

      // Step 2: fetch profile to get role
      return fetch(SUPABASE_URL_LOCAL + '/rest/v1/profiles?id=eq.' + data.user.id + '&select=role,full_name', {
        headers: { 'apikey': ANON_KEY_LOCAL, 'Authorization': 'Bearer ' + data.access_token }
      })
      .then(function (r) { return r.json(); })
      .then(function (rows) {
        var profile = Array.isArray(rows) && rows.length ? rows[0] : {};
        var sess = {
          access_token: data.access_token,
          user: data.user,
          role: profile.role || 'user',
          full_name: profile.full_name || ''
        };
        saveSession(sess);
        window.location.href = 'ops.html';
      });
    })
    .catch(function () { showError('Network error - please try again'); });
  }

  // Sign in on Enter key
  document.getElementById('password').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') signIn();
  });

  function showForgotPassword() {
    document.getElementById('forgot-panel').style.display = 'block';
    document.getElementById('reset-email').value = document.getElementById('email').value || '';
    document.getElementById('reset-success').style.display = 'none';
    document.getElementById('reset-error').style.display = 'none';
    document.getElementById('reset-email').focus();
  }

  function hideForgotPassword() {
    document.getElementById('forgot-panel').style.display = 'none';
  }

  function sendResetEmail() {
    var email = (document.getElementById('reset-email').value || '').trim();
    if (!email) {
      var err = document.getElementById('reset-error');
      err.textContent = 'Please enter your email address';
      err.style.display = 'block';
      return;
    }
    var btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    fetch(SUPABASE_URL_LOCAL + '/auth/v1/recover', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': ANON_KEY_LOCAL
      },
      body: JSON.stringify({ email: email })
    })
    .then(function(r) { return r.json(); })
    .then(function() {
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
      var ok = document.getElementById('reset-success');
      ok.textContent = 'Reset link sent to ' + email + '. Check your inbox (and spam folder).';
      ok.style.display = 'block';
      document.getElementById('reset-error').style.display = 'none';
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
      var err = document.getElementById('reset-error');
      err.textContent = 'Something went wrong. Please try again.';
      err.style.display = 'block';
    });
  }
  document.getElementById('email').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') signIn();
  });
</script>

</body>
</html>
