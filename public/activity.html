<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>CAGEWRX OPS - Activity Log</title>
  <meta name="theme-color" content="#060e18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CAGEWRX OPS">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="apple-touch-icon" href="img/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/favicon.png">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/activity-page.css">
</head>
<body>

<div class="app-shell">
<div id="sidebar-mount"></div>
<div class="app-content">

<!-- ===== HEADER ===== -->
<div class="act-header">
  <div class="act-header-content">
    <div class="act-header-left">
      <img class="act-logo" src="img/cagewrx_logo.png" alt="CAGEWRX OPS">
      <div>
        <div class="act-label">CAGEwrx Operations</div>
        <div class="act-title">ACTIVITY LOG</div>
      </div>
    </div>

    <div class="act-header-right">
      <button class="btn" onclick="loadActivityLog(false)">&#x21BB; Refresh</button>
      <button class="btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">&#x263C;</button>

      <div class="avatar-wrap">
        <div id="user-avatar">?</div>
        <div id="av-dd">
          <div class="av-profile">
            <div class="av-profile-name" id="avatar-name">Loading...</div>
            <div class="av-profile-email" id="avatar-email"></div>
            <span id="avatar-role-badge">User</span>
          </div>
          <button class="av-menu-item danger" onclick="signOut()">&#x2192; Sign Out</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="act-main">

  

  <div class="act-filters">
    <div class="act-search-wrap">
      <span style="color:#444;font-size:14px;">&#x2315;</span>
      <input class="act-search-input" type="text" id="act-search"
        placeholder="Search by summary or user..." oninput="renderActivityList()">
    </div>
    <select class="act-select" onchange="setLogFilterTable(this.value)">
      <option value="all">All Pages</option>
      <option value="orders">Orders</option>
      <option value="tasks">Production</option>
      <option value="faq_items">FAQ</option>
    </select>
    <select class="act-select" onchange="setLogFilterAction(this.value)">
      <option value="all">All Actions</option>
      <option value="create">Created</option>
      <option value="update">Edited</option>
      <option value="move">Moved</option>
      <option value="delete">Deleted</option>
    </select>
  </div>

  <div class="act-list" id="act-list">
    <div style="padding:40px;text-align:center;"><div class="spinner"></div></div>
  </div>

  <button class="act-load-more" id="act-load-more" onclick="loadMoreActivity()" style="display:none;">
    Load more
  </button>

</div><!-- end .act-main -->

</div><!-- end .app-content -->
</div><!-- end .app-shell -->

<!-- ===== SCRIPTS ===== -->
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/activity-log-helper.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/activity-page.js"></script>
<script>
  var _sess = requireAuth();
  initAvatarDropdown();
  renderAvatar(_sess);
  fetchProfile(_sess, function (sess) { _sess = sess; renderAvatar(_sess); });

  renderSidebar('activity');

  if (localStorage.getItem('cw_theme') === 'light') {
    document.body.classList.add('light-mode');
    var tb = document.getElementById('theme-btn');
    if (tb) tb.textContent = '☾';
  }

  loadActivityLog(false);
</script>

<div class="banner" id="banner"></div>
</body>
</html>
